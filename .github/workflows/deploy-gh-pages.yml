name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      pages: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # If the default GITHUB_TOKEN lacks push permissions, create a personal access token (classic)
          # with `repo` scope and save it in repo secrets as `PAGES_DEPLOY_TOKEN`.
          # The action will prefer `personal_token` when provided.
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
