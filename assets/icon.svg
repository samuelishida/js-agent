  <rect width="64" height="64" rx="12" fill="#0B3C5D"/>

  <!-- target rings -->
  <circle cx="32" cy="32" r="20" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.9"/>
  <circle cx="32" cy="32" r="12" stroke="#5b9bfd" stroke-width="3" fill="none" opacity="0.9"/>

  <!-- center agent core -->
